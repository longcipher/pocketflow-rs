[package]
name = "pocketflow"
version = "0.1.0"
edition = "2024"
description = "A minimalist LLM framework. Let Agents build Agents!"
license = "Apache-2.0"

[dependencies]
async-trait = "0.1.88"
dashmap = "6.1.0"
eyre = "0.6.12"
futures = "0.3.31"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
tokio = { version = "1.44.2", features = ["full"] }
tracing = "0.1.41"
